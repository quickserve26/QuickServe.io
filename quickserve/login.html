<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - QwikServe</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container small">
        <div class="logo">QwikServe</div>
        <h1>Welcome Back</h1>
        
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="primary-btn full-width">Login</button>
            
            <div class="divider">or</div>
            
            <button type="button" class="google-btn">
                <i class="fab fa-google"></i> Continue with Google
            </button>
        </form>
        
        <p class="register-link">
            Don't have an account? <a href="register-option.html">Sign up</a>
        </p>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // In real app, validate with backend
        // For demo, redirect based on user type
        const userType = 'customer'; // This would come from backend
        
        if (userType === 'customer') {
            window.location.href = 'customer/dashboard.html';
        } else {
            window.location.href = 'vendor/dashboard.html';
        }
    });
    </script>
</body>
</html>
