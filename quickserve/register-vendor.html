<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register as Vendor - QwikServe</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container large">
        <div class="logo">QwikServe</div>
        <h1>List Your Business on QwikServe</h1>
        
        <form id="vendorRegisterForm" class="auth-form">
            <!-- Personal Information -->
            <h2>Personal Information</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Your Full Name</label>
                    <input type="text" placeholder="Keitumetse P." required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="71 234 567" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="vendor@example.com" required>
            </div>
            
            <!-- Business Information -->
            <h2>Business Information</h2>
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" placeholder="Mma Keitumetse's Kitchen" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Cuisine Type</label>
                    <select required>
                        <option>Traditional Food</option>
                        <option>Fast Food</option>
                        <option>Snacks & Beverages</option>
                        <option>Mixed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Business Registration (if any)</label>
                    <input type="text" placeholder="Optional">
                </div>
            </div>
            
            <div class="form-group">
                <label>Business Address</label>
                <input type="text" placeholder="Main Mall, Gaborone" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Opening Time</label>
                    <input type="time" value="08:00" required>
                </div>
                <div class="form-group">
                    <label>Closing Time</label>
                    <input type="time" value="20:00" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create password" required>
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password" required>
            </div>
            
            <h2>Subscription Plan</h2>
            <div class="plan-selection">
                <label class="plan-option">
                    <input type="radio" name="plan" value="basic" checked>
                    <div class="plan-details">
                        <h4>Basic Plan - P200/month</h4>
                        <p>Up to 50 orders/month, basic analytics</p>
                    </div>
                </label>
                <label class="plan-option">
                    <input type="radio" name="plan" value="premium">
                    <div class="plan-details">
                        <h4>Premium Plan - P350/month</h4>
                        <p>Unlimited orders, advanced analytics, priority support</p>
                    </div>
                </label>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the Vendor Terms of Service</label>
            </div>
            
            <button type="submit" class="primary-btn full-width">
                Register as Vendor
            </button>
        </form>
        
        <p class="login-link">Already have a vendor account? <a href="login.html">Login</a></p>
    </div>

    <script>
    document.getElementById('vendorRegisterForm').addEventListener('submit', function(e) {
        e.preventDefault();
        // After successful registration, redirect to vendor dashboard
        window.location.href = 'vendor/dashboard.html';
    });
    </script>
</body>
</html>
