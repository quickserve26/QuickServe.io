<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join QwikServe - Choose Account Type</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="logo">QwikServe</div>
        <h1>Join as a customer or vendor</h1>
        
        <div class="option-cards">
            <a href="register-customer.html" class="option-card">
                <div class="icon"><i class="fas fa-user"></i></div>
                <h3>I'm a Customer</h3>
                <p>Order food, skip queues, and enjoy meals from local vendors</p>
                <button class="primary-btn">Continue as Customer</button>
            </a>
            
            <a href="register-vendor.html" class="option-card vendor-card">
                <div class="icon"><i class="fas fa-store"></i></div>
                <h3>I'm a Vendor</h3>
                <p>List your business, accept online orders, and grow your sales</p>
                <button class="secondary-btn">Continue as Vendor</button>
            </a>
        </div>
        
        <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
    </div>
</body>
</html>
