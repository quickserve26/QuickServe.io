<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>QuickServe - Customer Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #ff6b35; border-radius: 4px; }

        .navbar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 2px solid #ff6b35;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logo:hover { transform: scale(1.05); }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #ffaa7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .profile-btn, .logout-btn {
            background: rgba(255, 107, 53, 0.2);
            border: 1px solid #ff6b35;
            padding: 8px 15px;
            border-radius: 40px;
            color: #ff6b35;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .profile-btn:hover, .logout-btn:hover { background: #ff6b35; color: white; transform: scale(1.05); }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 5%; }

        /* Auth */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }
        .auth-card h2 { text-align: center; margin-bottom: 30px; color: #ff6b35; }
        .auth-input {
            width: 100%; padding: 15px; margin-bottom: 20px;
            background: #252525; border: 1px solid #333; border-radius: 12px;
            color: white; font-size: 16px;
        }
        .auth-input:focus { outline: none; border-color: #ff6b35; }
        .auth-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border: none; border-radius: 40px;
            font-weight: 600; cursor: pointer; color: white;
        }
        .auth-switch { text-align: center; margin-top: 20px; color: #888; }
        .auth-switch span { color: #ff6b35; cursor: pointer; text-decoration: underline; }

        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #2a2a2a;
            transition: all 0.4s ease;
        }
        .card:hover { transform: translateY(-5px); border-color: #ff6b35; }

        .carousel-container { position: relative; overflow: hidden; border-radius: 24px; margin-bottom: 30px; }
        .carousel-track { display: flex; transition: transform 0.5s ease; }
        .carousel-slide {
            min-width: 100%;
            height: 320px;
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            display: flex;
            align-items: flex-end;
            padding: 30px;
            position: relative;
        }
        .carousel-slide::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            border-radius: 24px;
        }
        .carousel-content { position: relative; z-index: 1; color: white; }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            z-index: 10;
        }
        .carousel-btn:hover { background: #ff6b35; transform: translateY(-50%) scale(1.1); }
        .carousel-btn.prev { left: 20px; }
        .carousel-btn.next { right: 20px; }

        .search-bar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .search-bar input {
            flex: 1; padding: 15px 20px; border-radius: 50px;
            border: 1px solid #333; background: #1a1a1a; color: white;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border: none; padding: 12px 28px; border-radius: 40px;
            font-weight: 600; cursor: pointer; color: white;
        }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(255,107,53,0.3); }
        .btn-outline {
            background: transparent; border: 2px solid #ff6b35;
            padding: 10px 24px; border-radius: 40px;
            font-weight: 600; cursor: pointer; color: #ff6b35;
        }
        .btn-outline:hover { background: #ff6b35; color: white; }

        .vendors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-top: 20px; }
        .vendor-card {
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid #2a2a2a;
            cursor: pointer;
        }
        .vendor-card:hover { transform: translateY(-5px); border-color: #ff6b35; }
        .vendor-header {
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .vendor-header-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        .meals-list { padding: 20px; max-height: 400px; overflow-y: auto; }
        .meal-item {
            display: flex; gap: 15px; padding: 15px;
            background: #252525; border-radius: 16px;
            margin-bottom: 12px; transition: all 0.3s ease;
            cursor: pointer;
        }
        .meal-item:hover { background: #2a2a2a; transform: translateX(5px); }
        .meal-image { width: 70px; height: 70px; border-radius: 16px; object-fit: cover; background: #333; }
        .meal-info { flex: 1; }
        .meal-info h4 { color: white; margin-bottom: 5px; }
        .meal-info p { font-size: 13px; color: #aaa; }
        .meal-price { font-weight: 700; color: #ff6b35; margin-top: 5px; }
        .expand-btn {
            background: rgba(255, 107, 53, 0.2);
            border: none; padding: 8px; border-radius: 50%;
            cursor: pointer; color: #ff6b35;
        }
        .order-progress { display: flex; justify-content: space-between; margin: 20px 0; }
        .progress-step { text-align: center; flex: 1; }
        .step-icon {
            width: 45px; height: 45px; background: #333; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px;
        }
        .progress-step.completed .step-icon { background: #ff6b35; color: white; transform: scale(1.1); }

        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 2000; justify-content: center; align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content, .payment-modal {
            background: #1a1a1a; border-radius: 24px; padding: 30px;
            max-width: 500px; width: 90%; border-top: 5px solid #ff6b35;
        }
        .payment-options { display: flex; flex-direction: column; gap: 15px; margin: 25px 0; }
        .payment-btn {
            padding: 15px; border-radius: 12px; border: 2px solid #333;
            background: #252525; color: white; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 12px; justify-content: center;
        }
        .payment-btn:hover { border-color: #ff6b35; background: #ff6b3520; transform: scale(1.02); }
        .profile-image { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #ff6b35; }
        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .order-card { background: #1a1a1a; border-radius: 16px; padding: 20px; border: 1px solid #2a2a2a; }
        .welcome-header {
            margin-bottom: 30px; padding: 20px;
            background: linear-gradient(135deg, #ff6b3510, #ff8c5a10);
            border-radius: 20px; border-left: 5px solid #ff6b35;
        }
        @media (max-width: 768px) { .navbar { flex-direction: column; } .vendors-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">QS</div>
            <div class="logo-text">QuickServe</div>
        </div>
        <div class="nav-actions" id="navActions" style="display: none;">
            <button class="profile-btn" onclick="openProfileModal()"><i class="fas fa-user-circle"></i> Profile</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Auth Section -->
        <div id="authSection" class="auth-container">
            <div class="auth-card">
                <h2 id="authTitle">Customer Login</h2>
                <input type="text" id="authEmail" placeholder="Email Address" class="auth-input">
                <input type="password" id="authPassword" placeholder="Password" class="auth-input">
                <button class="auth-btn" onclick="handleAuth()" id="authBtn">Login</button>
                <div class="auth-switch">
                    <span id="switchText">Don't have an account? <span onclick="toggleAuthMode()">Register</span></span>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <div class="welcome-header">
                <h2>Welcome back, <span id="welcomeName">Customer</span>! 🍔</h2>
                <p>Order your favorite food and skip the queue</p>
            </div>

            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack"></div>
                <button class="carousel-btn prev" onclick="prevSlide()">❮</button>
                <button class="carousel-btn next" onclick="nextSlide()">❯</button>
            </div>

            <div class="search-bar">
                <input type="text" id="vendorSearch" placeholder="🔍 Search vendors by name or location..." onkeyup="filterVendors()">
                <button class="btn-primary" onclick="showNearbyVendors()">📍 Find Near Me</button>
            </div>

            <h2><i class="fas fa-store"></i> Vendors Near You</h2>
            <div class="vendors-grid" id="vendorsGrid"></div>

            <h2 style="margin-top: 40px;"><i class="fas fa-truck"></i> My Active Orders</h2>
            <div class="orders-grid" id="myOrdersGrid"></div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="payment-modal">
            <h3 style="color: #ff6b35;">Complete Payment</h3>
            <p>Item: <strong id="paymentItem"></strong></p>
            <p>Amount: <strong style="color:#ff6b35; font-size:24px;" id="paymentAmount"></strong></p>
            <div class="payment-options">
                <button class="payment-btn" onclick="processPayment('Orange Money')"><i class="fas fa-mobile-alt"></i> Orange Money</button>
                <button class="payment-btn" onclick="processPayment('BTC Mobile')"><i class="fas fa-mobile-alt"></i> BTC Mobile</button>
                <button class="payment-btn" onclick="processPayment('Credit Card')"><i class="fas fa-credit-card"></i> Credit/Debit Card</button>
                <button class="payment-btn" onclick="processPayment('Cash on Arrival')"><i class="fas fa-money-bill-wave"></i> Cash on Arrival</button>
            </div>
            <button class="btn-outline" onclick="closePaymentModal()">Cancel</button>
        </div>
    </div>

    <!-- Track Modal -->
    <div id="trackModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#ff6b35;">Track Your Order</h3>
            <div id="trackingStatus"></div>
            <button class="btn-outline" onclick="closeTrackModal()" style="margin-top:20px;">Close</button>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#ff6b35;"><i class="fas fa-receipt"></i> Payment Receipt</h3>
            <div id="receiptContent"></div>
            <button class="btn-primary" onclick="closeReceiptModal()">Close</button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#ff6b35;"><i class="fas fa-user-circle"></i> My Profile</h3>
            <div style="text-align:center; margin:20px 0;">
                <img id="profileImage" src="" class="profile-image">
                <button class="btn-outline" onclick="uploadProfileImage()" style="margin-top:10px;"><i class="fas fa-upload"></i> Upload Picture</button>
                <input type="file" id="profileImageInput" accept="image/*" style="display:none;" onchange="handleProfileImageUpload(event)">
            </div>
            <p>Name: <strong id="profileName"></strong></p>
            <p>Email: <strong id="profileEmail"></strong></p>
            <p>Phone: <input type="text" id="profilePhone" style="background:#252525; border:1px solid #333; border-radius:8px; padding:8px; color:white; width:100%;"></p>
            <p>Location: <input type="text" id="profileLocation" style="background:#252525; border:1px solid #333; border-radius:8px; padding:8px; color:white; width:100%;"></p>
            <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
            <button class="btn-outline" onclick="closeProfileModal()" style="margin-top:10px;">Close</button>
        </div>
    </div>

    <!-- Expanded Vendor Modal -->
    <div id="expandedVendorModal" class="modal">
        <div class="modal-content expanded-modal">
            <div id="expandedVendorContent"></div>
            <button class="btn-outline" onclick="closeExpandedModal()" style="margin-top:20px;">Close</button>
        </div>
    </div>

    <script>
        const CUSTOMER_STORAGE_KEY = 'quickServe_customers';
        const VENDOR_STORAGE_KEY = 'quickServe_vendors';
        const ORDERS_KEY = 'quickServe_allOrders';
        const SESSION_KEY = 'quickServe_currentCustomer';

        let currentCustomer = null;
        let currentSlide = 0;
        let pendingOrder = null;

        function initStorage() {
            if (!localStorage.getItem(CUSTOMER_STORAGE_KEY)) localStorage.setItem(CUSTOMER_STORAGE_KEY, JSON.stringify([]));
            if (!localStorage.getItem(ORDERS_KEY)) localStorage.setItem(ORDERS_KEY, JSON.stringify([]));
        }

        function getActiveVendors() {
            const vendors = JSON.parse(localStorage.getItem(VENDOR_STORAGE_KEY)) || [];
            return vendors.filter(v => v.subscriptionActive === true && v.subscriptionPaid === true);
        }

        function getAllOrders() { return JSON.parse(localStorage.getItem(ORDERS_KEY)) || []; }
        function saveOrders(orders) { localStorage.setItem(ORDERS_KEY, JSON.stringify(orders)); }

        function renderCarousel() {
            const vendors = getActiveVendors();
            const specialMeals = [];
            vendors.forEach(v => {
                if (v.menu) v.menu.forEach(m => { if (m.available !== false) specialMeals.push({ name: m.name, vendor: v.name, image: m.image, price: m.price }); });
            });
            const track = document.getElementById('carouselTrack');
            if (specialMeals.length === 0) {
                track.innerHTML = `<div class="carousel-slide" style="background-image:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1200');"><div class="carousel-content"><h3>Welcome to QuickServe!</h3><p>Order from our local vendors</p></div></div>`;
                return;
            }
            track.innerHTML = specialMeals.map(m => `
                <div class="carousel-slide" style="background-image:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('${m.image || 'https://via.placeholder.com/1200x400?text=Food'}');">
                    <div class="carousel-content"><h3>${m.name}</h3><p>From ${m.vendor} - P${m.price}</p></div>
                </div>
            `).join('');
        }

        function checkLogin() {
            const saved = localStorage.getItem(SESSION_KEY);
            if (saved) { currentCustomer = JSON.parse(saved); showDashboard(); }
            else showAuth();
        }

        function showAuth() {
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('navActions').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            document.getElementById('navActions').style.display = 'flex';
            document.getElementById('welcomeName').innerText = currentCustomer.name;
            renderCarousel();
            renderVendors();
            renderMyOrders();
            document.getElementById('profileName').innerText = currentCustomer.name;
            document.getElementById('profileEmail').innerText = currentCustomer.email;
            document.getElementById('profilePhone').value = currentCustomer.phone || '';
            document.getElementById('profileLocation').value = currentCustomer.location || '';
            if (currentCustomer.profileImage) document.getElementById('profileIle-badge {
            background: #ff4444;
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
        }
        .expand-btn {
            background: rgba(255, 107, 53, 0.2);
            border: none;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ff6b35;
        }
        .expand-btn:hover { transform: scale(1.1); background: #ff6b35; color: white; }

        .order-progress { display: flex; justify-content: space-between; margin: 20px 0; }
        .progress-step { text-align: center; flex: 1; }
        .step-icon {
            width: 45px;
            height: 45px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }
        .progress-step.completed .step-icon { background: #ff6b35; color: white; transform: scale(1.1); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border-top: 5px solid #ff6b35;
        }
        .expanded-modal {
            max-width: 90%;
            width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .order-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a2a2a;
        }
        .payment-modal, .profile-modal {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
        }
        .payment-options { display: flex; flex-direction: column; gap: 15px; margin: 25px 0; }
        .payment-btn {
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #333;
            background: #252525;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }
        .payment-btn:hover { border-color: #ff6b35; background: #ff6b3520; transform: scale(1.02); }
        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff6b35;
        }
        .welcome-header {
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #ff6b3510, #ff8c5a10);
            border-radius: 20px;
            border-left: 5px solid #ff6b35;
        }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; }
            .vendors-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

            <h2><i class="fas fa-store"></i> Vendors Near You</h2>
            <div class="vendors-grid" id="vendorsGrid"></div>

            <h2 style="margin-top: 40px;"><i class="fas fa-truck"></i> My Active Orders</h2>
            <div class="orders-grid" id="myOrdersGrid"></div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="payment-modal">
            <h3 style="color: #ff6b35;">Complete Payment</h3>
            <p>Item: <strong id="paymentItem"></strong></p>
            <p>Amount: <strong style="color:#ff6b35; font-size:24px;" id="paymentAmount"></strong></p>
            <div class="payment-options">
                <button class="payment-btn" onclick="payWithOrangeMoney()"><i class="fas fa-mobile-alt"></i> Orange Money</button>
                <button class="payment-btn" onclick="payWithBTC()"><i class="fas fa-mobile-alt"></i> BTC Mobile</button>
                <button class="payment-btn" onclick="payWithCard()"><i class="fas fa-credit-card"></i> Credit/Debit Card</button>
                <button class="payment-btn" onclick="payWithCash()"><i class="fas fa-money-bill-wave"></i> Cash on Arrival</button>
            </div>
            <button class="btn-outline" onclick="closePaymentModal()">Cancel</button>
        </div>
    </div>

    <!-- Track Modal -->
    <div id="trackModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#ff6b35;">Track Your Order</h3>
            <div id="trackingStatus"></div>
            <button class="btn-outline" onclick="closeTrackModal()" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#ff6b35;"><i class="fas fa-receipt"></i> Payment Receipt</h3>
            <div id="receiptContent"></div>
            <button class="btn-primary" onclick="closeReceiptModal()">Close</button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal">
        <div class="profile-modal">
            <h3 style="color:#ff6b35;"><i class="fas fa-user-circle"></i> My Profile</h3>
            <div style="text-align: center; margin: 20px 0;">
                <img id="profileImage" src="" class="profile-image">
                <button class="btn-outline" onclick="uploadProfileImage()" style="margin-top: 10px;"><i class="fas fa-upload"></i> Upload Picture</button>
                <input type="file" id="profileImageInput" accept="image/*" style="display: none;" onchange="handleProfileImageUpload(event)">
            </div>
            <p>Name: <strong id="profileName"></strong></p>
            <p>Email: <strong id="profileEmail"></strong></p>
            <p>Phone: <input type="text" id="profilePhone" style="background:#252525; border:1px solid #333; border-radius:8px; padding:8px; color:white; width:100%;"></p>
            <p>Location: <input type="text" id="profileLocation" style="background:#252525; border:1px solid #333; border-radius:8px; padding:8px; color:white; width:100%;"></p>
            <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
            <button class="btn-outline" onclick="closeProfileModal()" style="margin-top: 10px;">Close</button>
        </div>
    </div>

    <!-- Expanded Vendor Modal -->
    <div id="expandedVendorModal" class="modal">
        <div class="modal-content expanded-modal">
            <div id="expandedVendorContent"></div>
            <button class="btn-outline" onclick="closeExpandedModal()" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <script>
        const CUSTOMER_STORAGE_KEY = 'quickServe_customers';
        const VENDOR_STORAGE_KEY = 'quickServe_vendors';
        const ORDERS_KEY = 'quickServe_allOrders';
        const SESSION_KEY = 'quickServe_currentCustomer';

        let currentCustomer = null;
        let currentSlide = 0;
        let pendingOrder = null;

        function initStorage() {
            if (!localStorage.getItem(CUSTOMER_STORAGE_KEY)) {
                localStorage.setItem(CUSTOMER_STORAGE_KEY, JSON.stringify([]));
            }
            if (!localStorage.getItem(ORDERS_KEY)) {
                localStorage.setItem(ORDERS_KEY, JSON.stringify([]));
            }
        }

        function getActiveVendors() {
            const vendors = JSON.parse(localStorage.getItem(VENDOR_STORAGE_KEY)) || [];
            return vendors.filter(v => v.subscriptionActive === true && v.subscriptionPaid === true);
        }

        function getAllOrders() {
            return JSON.parse(localStorage.getItem(ORDERS_KEY)) || [];
        }

        function saveOrders(orders) {
            localStorage.setItem(ORDERS_KEY, JSON.stringify(orders));
        }

        function renderCarousel() {
            const vendors = getActiveVendors();
            const specialMeals = [];
            vendors.forEach(vendor => {
                if (vendor.menu) {
                    vendor.menu.forEach(meal => {
                        if (meal.available !== false) {
                            specialMeals.push({ name: meal.name, vendor: vendor.name, image: meal.image, price: meal.price });
                        }
                    });
                }
            });
            const track = document.getElementById('carouselTrack');
            if (specialMeals.length === 0) {
                track.innerHTML = `<div class="carousel-slide" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1200');">
                    <div class="carousel-content"><h3>Welcome to QuickServe!</h3><p>Order from our local vendors</p></div>
                </div>`;
                return;
            }
            track.innerHTML = specialMeals.map(meal => `
                <div class="carousel-slide" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('${meal.image || 'https://via.placeholder.com/1200x400?text=Food'}');">
                    <div class="carousel-content">
                        <h3>${meal.name}</h3>
                        <p>From ${meal.vendor} - P${meal.price}</p>
                    </div>
                </div>
            `).join('');
        }

        function checkLogin() {
            const saved = localStorage.getItem(SESSION_KEY);
            if (saved) {
                currentCustomer = JSON.parse(saved);
                showDashboard();
            } else {
                showAuth();
            }
        }

        function showAuth() {
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('navActions').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            document.getElementById('navActions').style.display = 'flex';
            document.getElementById('welcomeName').innerText = currentCustomer.name;
            renderCarousel();
            renderVendors();
            renderMyOrders();
            // Load profile data
            document.getElementById('profileName').innerText = currentCustomer.name;
            document.getElementById('profileEmail').innerText = currentCustomer.email;
            document.getElementById('profilePhone').value = currentCustomer.phone || '';
            document.getElementById('profileLocation').value = currentCustomer.location || '';
            if (currentCustomer.profileImage) {
                document.getElementById('profileImage').src = currentCustomer.profileImage;
            }
        }

        function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const isLogin = document.getElementById('authBtn').innerText === 'Login';
            const customers = JSON.parse(localStorage.getItem(CUSTOMER_STORAGE_KEY));

            if (isLogin) {
                const customer = customers.find(c => c.email === email && c.password === password);
                if (customer) {
                    currentCustomer = customer;
                    localStorage.setItem(SESSION_KEY, JSON.stringify(customer));
                    showDashboard();
                } else {
                    alert('Invalid email or password');
                }
            } else {
                if (customers.find(c => c.email === email)) {
                    alert('Email already exists');
                    return;
                }
                const location = prompt("Enter your location for nearby vendors:");
                const newCustomer = {
                    id: Date.now(),
                    email: email,
                    password: password,
                    name: email.split('@')[0],
                    phone: '',
                    location: location || "Gaborone CBD",
                    profileImage: '',
                    orders: []
                };
                customers.push(newCustomer);
                localStorage.setItem(CUSTOMER_STORAGE_KEY, JSON.stringify(customers));
                currentCustomer = newCustomer;
                localStorage.setItem(SESSION_KEY, JSON.stringify(newCustomer));
                showDashboard();
            }
        }

        function toggleAuthMode() {
            const isLogin = document.getElementById('authBtn').innerText === 'Login';
            if (isLogin) {
                document.getElementById('authTitle').innerText = 'Customer Registration';
                document.getElementById('authBtn').innerText = 'Register';
                document.getElementById('switchText').innerHTML = 'Already have an account? <span onclick="toggleAuthMode()">Login</span>';
            } else {
                document.getElementById('authTitle').innerText = 'Customer Login';
                document.getElementById('authBtn').innerText = 'Login';
                document.getElementById('switchText').innerHTML = 'Don\'t have an account? <span onclick="toggleAuthMode()">Register</span>';
            }
        }

        function logout() {
            localStorage.removeItem(SESSION_KEY);
            currentCustomer = null;
            showAuth();
        }

        function renderVendors() {
            const vendors = getActiveVendors();
            const searchTerm = document.getElementById('vendorSearch')?.value.toLowerCase() || '';
            let filtered = vendors;
            if (currentCustomer?.location) {
                filtered = vendors.filter(v => {
                    const vendorLoc = v.location?.toLowerCase() || '';
                    const customerLoc = currentCustomer.location.toLowerCase();
                    return vendorLoc.includes(customerLoc.split(' ')[0]) || customerLoc.includes(vendorLoc.split(' ')[0]);
                });
            }
            if (searchTerm) {
                filtered = filtered.filter(v => v.name.toLowerCase().includes(searchTerm) || v.location?.toLowerCase().includes(searchTerm));
            }
            const grid = document.getElementById('vendorsGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="card" style="text-align:center;">No vendors found in your area.</div>';
                return;
            }
            grid.innerHTML = filtered.map(v => `
                <div class="vendor-card" onclick="expandVendor(${v.id})">
                    <div class="vendor-header">
                        ${v.profileImage ? `<img src="${v.profileImage}" class="vendor-header-img">` : `<div class="vendor-header-img" style="background:#ff6b35; display:flex; align-items:center; justify-content:center;"><i class="fas fa-store"></i></div>`}
                        <div style="flex:1;">
                            <h3>${v.name}</h3>
                            <p><i class="fas fa-map-marker-alt"></i> ${v.location || 'Location not set'}</p>
                            <p><i class="fas fa-phone"></i> ${v.phone || 'No phone'}</p>
                        </div>
                        <button class="expand-btn" onclick="event.stopPropagation(); expandVendor(${v.id})"><i class="fas fa-expand"></i></button>
                    </div>
                    <div class="meals-list">
                        <h4 style="margin-bottom: 10px; color:#ff6b35;">Today's Menu</h4>
                        ${v.menu && v.menu.length > 0 ? v.menu.slice(0, 2).map(meal => `
                            <div class="meal-item" onclick="event.stopPropagation(); openPaymentModal(${v.id}, '${meal.name.replace(/'/g, "\\'")}', ${meal.price}, '${meal.image || ''}')">
                                ${meal.image ? `<img src="${meal.image}" class="meal-image" onerror="this.src='https://via.placeholder.com/70?text=Food'">` : `<div class="meal-image" style="background:#333; display:flex; align-items:center; justify-content:center;"><i class="fas fa-utensils"></i></div>`}
                                <div class="meal-info">
                                    <h4>${meal.name}</h4>
                                    <p>${meal.desc || 'Delicious meal'}</p>
                                    <div class="meal-price">P${meal.price}</div>
                                    ${meal.available === false ? '<div class="unavailable-badge">Unavailable</div>' : ''}
                                </div>
                            </div>
                        `).join('') : '<p style="color:#888;">No menu items yet</p>'}
                        ${v.menu && v.menu.length > 2 ? `<p style="text-align:center; margin-top:10px;"><small>+ ${v.menu.length - 2} more items. Click to expand.</small></p>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function expandVendor(vendorId) {
            const vendor = getActiveVendors().find(v => v.id === vendorId);
            if (!vendor) return;
            const content = `
                <div class="vendor-header" style="margin-bottom: 20px;">
                    ${vendor.profileImage ? `<img src="${vendor.profileImage}" style="width:80px; height:80px; border-radius:50%;">` : `<div style="width:80px; height:80px; background:#ff6b35; border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="fas fa-store" style="font-size:40px;"></i></div>`}
                    <div style="flex:1;">
                        <h2>${vendor.name}</h2>
                        <p><i class="fas fa-map-marker-alt"></i> ${vendor.location || 'Location not set'}</p>
                        <p><i class="fas fa-phone"></i> ${vendor.phone || 'No phone'}</p>
                    </div>
                </div>
                <h3 style="color:#ff6b35;">Full Menu</h3>
                <div style="display: flex; flex-direction: column; gap: 15px; max-height: 500px; overflow-y: auto;">
                    ${vendor.menu && vendor.menu.length > 0 ? vendor.menu.map(meal => `
                        <div class="meal-item" style="cursor: pointer;" onclick="openPaymentModal(${vendor.id}, '${meal.name.replace(/'/g, "\\'")}', ${meal.price}, '${meal.image || ''}')">
                            ${meal.image ? `<img src="${meal.image}" class="meal-image" style="width:80px; height:80px;">` : `<div class="meal-image" style="width:80px; height:80px; background:#333; display:flex; align-items:center; justify-content:center;"><i class="fas fa-utensils"></i></div>`}
                            <div class="meal-info">
                                <h4>${meal.name}</h4>
                                <p>${meal.desc || 'Delicious meal'}</p>
                                <div class="meal-price">P${meal.price}</div>
                                ${meal.available === false ? '<div class="unavailable-badge">Unavailable</div>' : ''}
                            </div>
                        </div>
                    `).join('') : '<p>No menu items available</p>'}
                </div>
            `;
            document.getElementById('expandedVendorContent').innerHTML = content;
            document.getElementById('expandedVendorModal').classList.add('active');
        }

        function closeExpandedModal() {
            document.getElementById('expandedVendorModal').classList.remove('active');
        }

        function filterVendors() { renderVendors(); }

        function showNearbyVendors() {
            if (!currentCustomer?.location) {
                alert('Please update your location in profile');
                return;
            }
            alert(`📍 Showing vendors near ${currentCustomer.location}`);
            renderVendors();
        }

        function openPaymentModal(vendorId, itemName, price, image) {
            pendingOrder = { vendorId, itemName, price, image };
            document.getElementById('paymentItem').innerText = itemName;
            document.getElementById('paymentAmount').innerText = `P${price}`;
            document.getElementById('paymentModal').classList.add('active');
        }

        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('active');
            pendingOrder = null;
        }

        function payWithOrangeMoney() { processPayment('Orange Money'); }
        function payWithBTC() { processPayment('BTC Mobile'); }
        function payWithCard() { processPayment('Credit/Debit Card'); }
        function payWithCash() { processPayment('Cash on Arrival'); }

        function processPayment(method) {
            if (!pendingOrder) return;
            const order = {
                id: Date.now(),
                vendorId: pendingOrder.vendorId,
                customerId: currentCustomer.id,
                customerName: currentCustomer.name,
                item: pendingOrder.itemName,
                price: pendingOrder.price,
                image: pendingOrder.image,
                status: 'pending',
                timestamp: new Date().toLocaleString(),
                paymentMethod: method,
                paymentStatus: method === 'Cash on Arrival' ? 'pending' : 'completed'
            };
            const orders = getAllOrders();
            orders.push(order);
            saveOrders(orders);
            const receipt = `<p><strong>Receipt #${order.id}</strong></p><p>Date: ${order.timestamp}</p><p>Item: ${order.item}</p><p>Amount: P${order.price}</p><p>Payment Method: ${method}</p><p>Status: ${method === 'Cash on Arrival' ? 'Pay at pickup' : 'PAID'}</p>`;
            document.getElementById('receiptContent').innerHTML = receipt;
            closePaymentModal();
            document.getElementById('receiptModal').classList.add('active');
            renderMyOrders();
            alert(`✅ Order placed! ${method === 'Cash on Arrival' ? 'Pay when you pick up.' : `Payment of P${order.price} completed!`} Your order will be ready soon.`);
        }

        function closeReceiptModal() { document.getElementById('receiptModal').classList.remove('active'); }

        function renderMyOrders() {
            const orders = getAllOrders();
            const customerOrders = orders.filter(o => o.customerId === currentCustomer?.id && o.status !== 'completed');
            const grid = document.getElementById('myOrdersGrid');
            if (customerOrders.length === 0) {
                grid.innerHTML = '<div class="card" style="text-align:center;">No active orders</div>';
                return;
            }
            grid.innerHTML = customerOrders.map(order => `
                <div class="order-card" onclick="trackOrder(${order.id})">
                    <p><strong>${order.item}</strong></p>
                    <p>From: ${getActiveVendors().find(v => v.id === order.vendorId)?.name || 'Vendor'}</p>
                    <p>Amount: <span style="color:#ff6b35;">P${order.price}</span></p>
                    <p>Payment: ${order.paymentMethod} (${order.paymentStatus === 'completed' ? 'Paid' : 'Pay on arrival'})</p>
                    <p>Status: <span style="color: ${order.status === 'ready' ? '#4caf50' : '#ff6b35'}">${order.status.toUpperCase()}</span></p>
                    <button class="btn-outline" onclick="event.stopPropagation(); trackOrder(${order.id})">Track Order</button>
                </div>
            `).join('');
        }

        function trackOrder(orderId) {
            const orders = getAllOrders();
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            const statuses = ['pending', 'preparing', 'ready'];
            const currentIndex = statuses.indexOf(order.status);
            document.getElementById('trackingStatus').innerHTML = `
                <div class="order-progress">
                    ${statuses.map((s, i) => `<div class="progress-step ${i <= currentIndex ? 'completed' : ''}">
                        <div class="step-icon"><i class="fas ${s === 'pending' ? 'fa-clock' : s === 'preparing' ? 'fa-fire' : 'fa-check'}"></i></div>
                        <p>${s.toUpperCase()}</p>
                    </div>`).join('')}
                </div>
                <p><strong>Item:</strong> ${order.item}</p>
                <p><strong>Amount:</strong> P${order.price}</p>
                <p><strong>Payment:</strong> ${order.paymentMethod}</p>
                <p><strong>Order Time:</strong> ${order.timestamp}</p>
                <button class="btn-primary" onclick="closeTrackModal()">Close</button>
            `;
            document.getElementById('trackModal').classList.add('active');
        }

        function closeTrackModal() { document.getElementById('trackModal').classList.remove('active'); }

        function openProfileModal() { document.getElementById('profileModal').classList.add('active'); }
        function closeProfileModal() { document.getElementById('profileModal').classList.remove('active'); }

        function uploadProfileImage() {
            document.getElementById('profileImageInput').click();
        }

        function handleProfileImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentCustomer.profileImage = e.target.result;
                    updateCustomerInStorage();
                    document.getElementById('profileImage').src = e.target.result;
                    alert('Profile picture updated!');
                };
                reader.readAsDataURL(file);
            }
        }

        function saveProfile() {
            currentCustomer.phone = document.getElementById('profilePhone').value;
            currentCustomer.location = document.getElementById('profileLocation').value;
            updateCustomerInStorage();
            closeProfileModal();
            renderVendors();
            alert('Profile updated!');
        }

        function updateCustomerInStorage() {
            const customers = JSON.parse(localStorage.getItem(CUSTOMER_STORAGE_KEY));
            const index = customers.findIndex(c => c.id === currentCustomer.id);
            if (index !== -1) {
                customers[index] = currentCustomer;
                localStorage.setItem(CUSTOMER_STORAGE_KEY, JSON.stringify(customers));
                localStorage.setItem(SESSION_KEY, JSON.stringify(currentCustomer));
            }
        }

        function prevSlide() {
            const track = document.getElementById('carouselTrack');
            const slides = document.querySelectorAll('.carousel-slide');
            if (slides.length === 0) return;
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }
        function nextSlide() {
            const track = document.getElementById('carouselTrack');
            const slides = document.querySelectorAll('.carousel-slide');
            if (slides.length === 0) return;
            currentSlide = (currentSlide + 1) % slides.length;
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }
        setInterval(nextSlide, 5000);

        initStorage();
        checkLogin();
    </script>
</body>
</html>
