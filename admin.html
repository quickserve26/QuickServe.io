<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickServe - Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #ffffff;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2a2a2a; }
        ::-webkit-scrollbar-thumb { background: #ff6b35; border-radius: 4px; }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 107, 53, 0.3);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logo:hover { transform: scale(1.05); }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #000;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #ffaa7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logout-btn {
            background: rgba(255, 107, 53, 0.2);
            border: 1px solid #ff6b35;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ff6b35;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover { background: #ff6b35; color: #000; transform: scale(1.05); }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px 5%; }

        /* Auth */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 107, 53, 0.3);
            transition: all 0.4s ease;
        }
        .auth-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(255, 107, 53, 0.2); border-color: #ff6b35; }
        .auth-card h2 { text-align: center; margin-bottom: 30px; color: #ff6b35; }
        .auth-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .auth-input:focus { outline: none; border-color: #ff6b35; box-shadow: 0 0 10px rgba(255, 107, 53, 0.3); }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #000;
        }
        .auth-btn:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(255, 107, 53, 0.4); }

        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 107, 53, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.1), transparent);
            transition: left 0.6s ease;
        }
        .card:hover { transform: translateY(-10px) scale(1.02); border-color: rgba(255, 107, 53, 0.6); }
        .card:hover::before { left: 100%; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1e1e1e, #252525);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-radius: 40px 20px 40px 20px;
            box-shadow: 0 10px 30px rgba(255,107,53,0.3);
        }
        .stat-number { font-size: 42px; font-weight: 800; color: #ff6b35; }

        .vendor-table {
            width: 100%;
            border-collapse: collapse;
        }
        .vendor-table th, .vendor-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .vendor-table tr:hover { background: #2a2a2a; }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #000;
        }
        .btn-primary:hover { transform: scale(1.05); }
        .btn-outline {
            background: transparent;
            border: 2px solid #ff6b35;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ff6b35;
        }
        .btn-outline:hover { background: #ff6b35; color: #000; }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; }
            .vendor-table { font-size: 12px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">QS</div>
            <div class="logo-text">QuickServe</div>
        </div>
        <div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Admin Login -->
        <div id="authSection" class="auth-container">
            <div class="auth-card">
                <h2>Admin Login</h2>
                <input type="text" id="adminEmail" placeholder="Admin Email" class="auth-input" value="admin@quickserve.com">
                <input type="password" id="adminPassword" placeholder="Password" class="auth-input" value="admin123">
                <button class="auth-btn" onclick="handleAdminLogin()">Login</button>
                <p style="text-align: center; margin-top: 20px; color: #666;">Demo: admin@quickserve.com / admin123</p>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="dashboard" class="dashboard">
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-number" id="totalVendors">0</span><br>Total Vendors</div>
                <div class="stat-card"><span class="stat-number" id="totalCustomers">0</span><br>Total Customers</div>
                <div class="stat-card"><span class="stat-number" id="totalOrders">0</span><br>Total Orders</div>
                <div class="stat-card"><span class="stat-number" id="monthlyRevenue">P0</span><br>Monthly Revenue</div>
            </div>

            <div class="card">
                <h3><i class="fas fa-chart-bar"></i> Platform Analytics</h3>
                <canvas id="adminChart" style="max-height: 300px; width: 100%;"></canvas>
            </div>

            <div class="card">
                <h3><i class="fas fa-store"></i> All Vendors & Subscription Status</h3>
                <table class="vendor-table">
                    <thead>
                        <tr><th>Vendor Name</th><th>Location</th><th>Subscription</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="adminVendorList"></tbody>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-users"></i> All Customers</h3>
                <div id="adminCustomerList"></div>
            </div>

            <div class="card">
                <h3><i class="fas fa-dollar-sign"></i> Subscription Payments</h3>
                <div id="paymentHistory"></div>
                <button class="btn-primary" onclick="recordPayment()" style="margin-top: 15px;">Record Payment</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_CREDENTIALS = { email: "admin@quickserve.com", password: "admin123" };
        const VENDOR_STORAGE_KEY = 'quickServe_vendors';
        const CUSTOMER_STORAGE_KEY = 'quickServe_customers';

        let adminChart = null;

        function getVendors() {
            return JSON.parse(localStorage.getItem(VENDOR_STORAGE_KEY)) || [];
        }

        function getCustomers() {
            return JSON.parse(localStorage.getItem(CUSTOMER_STORAGE_KEY)) || [];
        }

        function getAllOrders() {
            const vendors = getVendors();
            let allOrders = [];
            vendors.forEach(v => {
                if (v.orderHistory) allOrders.push(...v.orderHistory);
                if (v.orders) allOrders.push(...v.orders);
            });
            return allOrders;
        }

        function handleAdminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            if (email === ADMIN_CREDENTIALS.email && password === ADMIN_CREDENTIALS.password) {
                localStorage.setItem('quickServe_adminLoggedIn', 'true');
                showDashboard();
            } else {
                alert('Invalid admin credentials');
            }
        }

        function checkLogin() {
            if (localStorage.getItem('quickServe_adminLoggedIn') === 'true') {
                showDashboard();
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('dashboard').classList.remove('active');
            }
        }

        function showDashboard() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            renderAdminDashboard();
        }

        function logout() {
            localStorage.removeItem('quickServe_adminLoggedIn');
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
        }

        function renderAdminDashboard() {
            const vendors = getVendors();
            const customers = getCustomers();
            const allOrders = getAllOrders();

            document.getElementById('totalVendors').innerHTML = vendors.length;
            document.getElementById('totalCustomers').innerHTML = customers.length;
            document.getElementById('totalOrders').innerHTML = allOrders.length;
            const paidVendors = vendors.filter(v => v.subscriptionPaid).length;
            document.getElementById('monthlyRevenue').innerHTML = `P${paidVendors * 250}`;

            // Vendor Table
            const vendorList = document.getElementById('adminVendorList');
            vendorList.innerHTML = vendors.map(v => `
                <tr>
                    <td>${v.name}</td>
                    <td>${v.location || 'Not set'}</td>
                    <td>P250/month</td>
                    <td style="color: ${v.subscriptionPaid ? '#4caf50' : '#ff6b35'}">${v.subscriptionPaid ? 'Active' : 'Pending'}</td>
                    <td><button class="btn-outline" onclick="toggleSubscription(${v.id})">${v.subscriptionPaid ? 'Deactivate' : 'Activate'}</button></td>
                </tr>
            `).join('');

            // Customer List
            document.getElementById('adminCustomerList').innerHTML = customers.map(c => `
                <div style="padding: 10px; border-bottom: 1px solid #333;">
                    <i class="fas fa-user"></i> ${c.name} (${c.email}) - ${c.orders?.length || 0} orders placed
                </div>
            `).join('');

            // Payment History
            const paidVendorsList = vendors.filter(v => v.subscriptionPaid);
            document.getElementById('paymentHistory').innerHTML = paidVendorsList.map(v => `
                <div style="padding: 10px; border-bottom: 1px solid #333;">
                    ${v.name} - Paid P250 for this month
                </div>
            `).join('') || '<p>No payments recorded</p>';

            // Chart
            updateChart();
        }

        function toggleSubscription(vendorId) {
            const vendors = getVendors();
            const vendor = vendors.find(v => v.id === vendorId);
            if (vendor) {
                vendor.subscriptionPaid = !vendor.subscriptionPaid;
                localStorage.setItem(VENDOR_STORAGE_KEY, JSON.stringify(vendors));
                renderAdminDashboard();
            }
        }

        function recordPayment() {
            const vendors = getVendors();
            const unpaidVendors = vendors.filter(v => !v.subscriptionPaid);
            if (unpaidVendors.length === 0) {
                alert('All vendors have active subscriptions!');
                return;
            }
            const vendorNames = unpaidVendors.map(v => v.name).join(', ');
            const vendorName = prompt(`Enter vendor name to record payment.\nUnpaid vendors: ${vendorNames}`);
            const vendor = vendors.find(v => v.name.toLowerCase() === vendorName?.toLowerCase());
            if (vendor) {
                vendor.subscriptionPaid = true;
                localStorage.setItem(VENDOR_STORAGE_KEY, JSON.stringify(vendors));
                renderAdminDashboard();
                alert(`Payment recorded for ${vendor.name}`);
            } else {
                alert('Vendor not found');
            }
        }

        function updateChart() {
            const ctx = document.getElementById('adminChart')?.getContext('2d');
            if (!ctx) return;
            const vendors = getVendors();
            const weeklyOrders = [45, 62, 78, getAllOrders().length];
            if (adminChart) adminChart.destroy();
            adminChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    datasets: [{
                        label: 'Orders',
                        data: weeklyOrders,
                        borderColor: '#ff6b35',
                        backgroundColor: 'rgba(255, 107, 53, 0.1)',
                        tension: 0.4,
                        fill: true
                    }, {
                        label: 'Vendors',
                        data: [vendors.length-2, vendors.length-1, vendors.length, vendors.length],
                        borderColor: '#ffaa7a',
                        backgroundColor: 'rgba(255, 170, 122, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }

        // Initialize default subscription status
        function initAdmin() {
            const vendors = getVendors();
            let changed = false;
            vendors.forEach(v => {
                if (v.subscriptionPaid === undefined) {
                    v.subscriptionPaid = true;
                    changed = true;
                }
            });
            if (changed) localStorage.setItem(VENDOR_STORAGE_KEY, JSON.stringify(vendors));
            checkLogin();
        }

        initAdmin();
    </script>
</body>
</html>
