<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickServe - Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #ff6b35; border-radius: 4px; }

        .navbar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #ff6b35;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logo:hover { transform: scale(1.05); }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #ffaa7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logout-btn {
            background: #ff6b35;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover { background: #e55a2a; transform: scale(1.05); }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px 5%; }

        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 107, 53, 0.3);
            transition: all 0.4s ease;
        }
        .auth-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(255, 107, 53, 0.2); border-color: #ff6b35; }
        .auth-card h2 { text-align: center; margin-bottom: 30px; color: #ff6b35; }
        .auth-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .auth-input:focus { outline: none; border-color: #ff6b35; box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.2); }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        .auth-btn:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(255, 107, 53, 0.3); }

        .dashboard { display: none; }
        .dashboard.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #2a2a2a;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-5px); border-color: #ff6b35; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a1a, #252525);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s ease;
            border: 1px solid #333;
        }
        .stat-card:hover { transform: translateY(-5px); border-radius: 40px 20px 40px 20px; border-color: #ff6b35; }
        .stat-number { font-size: 42px; font-weight: 800; color: #ff6b35; }

        .vendor-table { width: 100%; border-collapse: collapse; }
        .vendor-table th, .vendor-table td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        .vendor-table tr:hover { background: #252525; }

        .customer-list { max-height: 400px; overflow-y: auto; }
        .customer-item {
            padding: 15px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .customer-item:hover { background: #252525; }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }
        .btn-primary:hover { transform: scale(1.05); }
        .btn-outline {
            background: transparent;
            border: 2px solid #ff6b35;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #ff6b35;
        }
        .btn-outline:hover { background: #ff6b35; color: white; }
        .btn-danger {
            background: #ff4444;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }
        .btn-danger:hover { background: #cc0000; transform: scale(1.05); }

        .search-input {
            padding: 10px 15px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 40px;
            color: white;
            width: 100%;
            max-width: 300px;
            margin-bottom: 15px;
        }
        .admin-hint { text-align: center; margin-top: 20px; padding: 10px; background: rgba(255, 107, 53, 0.1); border-radius: 12px; color: #ffaa7a; font-size: 13px; }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; }
            .vendor-table { font-size: 12px; }
            .vendor-table th, .vendor-table td { padding: 8px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">QS</div>
            <div class="logo-text">QuickServe</div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="container">
        <div id="authSection" class="auth-container">
            <div class="auth-card">
                <h2><i class="fas fa-shield-alt"></i> Admin Login</h2>
                <input type="email" id="adminEmail" placeholder="Admin Email" class="auth-input">
                <input type="password" id="adminPassword" placeholder="Password" class="auth-input">
                <button class="auth-btn" onclick="handleAdminLogin()">Login</button>
                <div class="admin-hint">
                    <i class="fas fa-lock"></i> This area is restricted to administrators only.
                </div>
            </div>
        </div>

        <div id="dashboard" class="dashboard">
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-number" id="totalVendors">0</span><br>Total Vendors</div>
                <div class="stat-card"><span class="stat-number" id="activeVendors">0</span><br>Active Vendors</div>
                <div class="stat-card"><span class="stat-number" id="totalCustomers">0</span><br>Total Customers</div>
                <div class="stat-card"><span class="stat-number" id="totalOrders">0</span><br>Total Orders</div>
                <div class="stat-card"><span class="stat-number" id="monthlyRevenue">P0</span><br>Monthly Revenue</div>
            </div>

            <div class="card">
                <h3><i class="fas fa-chart-bar"></i> Platform Analytics</h3>
                <canvas id="adminChart" style="max-height: 300px; width: 100%;"></canvas>
            </div>

            <div class="card">
                <h3><i class="fas fa-store"></i> All Vendors</h3>
                <input type="text" id="vendorSearch" class="search-input" placeholder="🔍 Search vendors..." onkeyup="filterVendors()">
                <div style="overflow-x: auto;">
                    <table class="vendor-table">
                        <thead><tr><th>Vendor</th><th>Location</th><th>Phone</th><th>Subscription</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="adminVendorList"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h3><i class="fas fa-users"></i> All Customers</h3>
                <input type="text" id="customerSearch" class="search-input" placeholder="🔍 Search customers..." onkeyup="filterCustomers()">
                <div id="adminCustomerList" class="customer-list"></div>
            </div>

            <div class="card">
                <h3><i class="fas fa-dollar-sign"></i> Subscription Payments</h3>
                <div id="paymentHistory"></div>
                <button class="btn-primary" onclick="recordPayment()" style="margin-top: 15px;"><i class="fas fa-plus"></i> Record Payment</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "quickserve@gmail.com";
        const ADMIN_PASSWORD = "servequick@26";
        const VENDOR_STORAGE_KEY = 'quickServe_vendors';
        const CUSTOMER_STORAGE_KEY = 'quickServe_customers';
        const ORDERS_KEY = 'quickServe_allOrders';

        let adminChart = null;
        let currentVendorFilter = '';
        let currentCustomerFilter = '';

        function getVendors() { return JSON.parse(localStorage.getItem(VENDOR_STORAGE_KEY)) || []; }
        function getCustomers() { return JSON.parse(localStorage.getItem(CUSTOMER_STORAGE_KEY)) || []; }
        function getAllOrders() { return JSON.parse(localStorage.getItem(ORDERS_KEY)) || []; }
        function saveVendors(vendors) { localStorage.setItem(VENDOR_STORAGE_KEY, JSON.stringify(vendors)); }
        function saveCustomers(customers) { localStorage.setItem(CUSTOMER_STORAGE_KEY, JSON.stringify(customers)); }

        function handleAdminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                localStorage.setItem('quickServe_adminLoggedIn', 'true');
                showDashboard();
                document.getElementById('adminEmail').value = '';
                document.getElementById('adminPassword').value = '';
            } else {
                alert('❌ Invalid admin credentials. Access denied.');
                document.getElementById('adminPassword').value = '';
            }
        }

        function checkLogin() {
            if (localStorage.getItem('quickServe_adminLoggedIn') === 'true') {
                showDashboard();
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('dashboard').classList.remove('active');
            }
        }

        function showDashboard() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            renderAdminDashboard();
        }

        function logout() {
            localStorage.removeItem('quickServe_adminLoggedIn');
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
        }

        function renderAdminDashboard() {
            const vendors = getVendors();
            const customers = getCustomers();
            const allOrders = getAllOrders();
            const activeVendors = vendors.filter(v => v.subscriptionActive === true && v.subscriptionPaid === true);

            document.getElementById('totalVendors').innerHTML = vendors.length;
            document.getElementById('activeVendors').innerHTML = activeVendors.length;
            document.getElementById('totalCustomers').innerHTML = customers.length;
            document.getElementById('totalOrders').innerHTML = allOrders.length;
            const monthlyRevenue = vendors.filter(v => v.subscriptionActive && v.subscriptionPaid).length * 250;
            document.getElementById('monthlyRevenue').innerHTML = `P${monthlyRevenue}`;

            renderVendorTable(vendors);
            renderCustomerList(customers);
            renderPaymentHistory(vendors);
            updateChart(vendors, allOrders);
        }

        function renderVendorTable(vendors) {
            let filtered = vendors;
            if (currentVendorFilter) {
                filtered = vendors.filter(v => v.name.toLowerCase().includes(currentVendorFilter.toLowerCase()) ||
                    (v.location && v.location.toLowerCase().includes(currentVendorFilter.toLowerCase())) ||
                    (v.email && v.email.toLowerCase().includes(currentVendorFilter.toLowerCase())));
            }
            const tbody = document.getElementById('adminVendorList');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No vendors found</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(v => `
                <tr>
                    <td><strong>${v.name}</strong><br><small style="color:#888;">${v.email}</small></td>
                    <td>${v.location || 'Not set'}</td>
                    <td>${v.phone || 'Not set'}</td>
                    <td>P250/month</td>
                    <td style="color: ${v.subscriptionActive && v.subscriptionPaid ? '#4caf50' : '#ff6b35'};">
                        ${v.subscriptionActive && v.subscriptionPaid ? '✓ Active' : '✗ Inactive'}
                    </td>
                    <td>
                        <button class="btn-outline" onclick="toggleVendorSubscription(${v.id})" style="margin-right:5px;">
                            ${v.subscriptionActive ? 'Deactivate' : 'Activate'}
                        </button>
                        <button class="btn-danger" onclick="deleteVendor(${v.id})"><i class="fas fa-trash"></i> Remove</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderCustomerList(customers) {
            let filtered = customers;
            if (currentCustomerFilter) {
                filtered = customers.filter(c => c.name.toLowerCase().includes(currentCustomerFilter.toLowerCase()) ||
                    c.email.toLowerCase().includes(currentCustomerFilter.toLowerCase()) ||
                    (c.location && c.location.toLowerCase().includes(currentCustomerFilter.toLowerCase())));
            }
            const container = document.getElementById('adminCustomerList');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">No customers found</div>';
                return;
            }
            container.innerHTML = filtered.map(c => `
                <div class="customer-item">
                    <div>
                        <strong><i class="fas fa-user"></i> ${c.name}</strong><br>
                        <small>${c.email}</small><br>
                        <small><i class="fas fa-map-marker-alt"></i> ${c.location || 'Not set'}</small><br>
                        <small><i class="fas fa-shopping-bag"></i> ${c.orders?.length || 0} orders</small>
                    </div>
                    <button class="btn-danger" onclick="deleteCustomer(${c.id})"><i class="fas fa-trash"></i> Remove</button>
                </div>
            `).join('');
        }

        function renderPaymentHistory(vendors) {
            const paidVendors = vendors.filter(v => v.subscriptionActive && v.subscriptionPaid);
            const container = document.getElementById('paymentHistory');
            if (paidVendors.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:20px;">No payments recorded</p>';
                return;
            }
            container.innerHTML = paidVendors.map(v => `
                <div style="padding:12px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                    <div><strong>${v.name}</strong><br><small>${v.email}</small></div>
                    <div><span style="color:#4caf50;">✓ P250 paid</span></div>
                </div>
            `).join('');
        }

        function toggleVendorSubscription(vendorId) {
            const vendors = getVendors();
            const vendor = vendors.find(v => v.id === vendorId);
            if (vendor) {
                vendor.subscriptionActive = !vendor.subscriptionActive;
                if (vendor.subscriptionActive) vendor.subscriptionPaid = true;
                saveVendors(vendors);
                renderAdminDashboard();
                alert(`${vendor.name} subscription ${vendor.subscriptionActive ? 'activated' : 'deactivated'}`);
            }
        }

        function deleteVendor(vendorId) {
            if (confirm('Are you sure? This will delete all vendor data.')) {
                const vendors = getVendors().filter(v => v.id !== vendorId);
                saveVendors(vendors);
                renderAdminDashboard();
                alert('Vendor removed');
            }
        }

        function deleteCustomer(customerId) {
            if (confirm('Are you sure? This will delete the customer and their orders.')) {
                const customers = getCustomers().filter(c => c.id !== customerId);
                saveCustomers(customers);
                renderAdminDashboard();
                alert('Customer removed');
            }
        }

        function recordPayment() {
            const vendors = getVendors();
            const unpaid = vendors.filter(v => !v.subscriptionActive || !v.subscriptionPaid);
            if (unpaid.length === 0) {
                alert('All vendors have active subscriptions!');
                return;
            }
            const name = prompt(`Enter vendor name to record payment.\nUnpaid: ${unpaid.map(v => v.name).join(', ')}`);
            const vendor = vendors.find(v => v.name.toLowerCase() === name?.toLowerCase());
            if (vendor) {
                vendor.subscriptionActive = true;
                vendor.subscriptionPaid = true;
                saveVendors(vendors);
                renderAdminDashboard();
                alert(`Payment recorded for ${vendor.name}`);
            } else {
                alert('Vendor not found');
            }
        }

        function updateChart(vendors, orders) {
            const ctx = document.getElementById('adminChart')?.getContext('2d');
            if (!ctx) return;
            if (adminChart) adminChart.destroy();
            adminChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    datasets: [
                        { label: 'Orders', data: [45, 62, 78, orders.length], borderColor: '#ff6b35', backgroundColor: 'rgba(255,107,53,0.1)', tension: 0.4, fill: true },
                        { label: 'Active Vendors', data: [vendors.filter(v=>v.subscriptionActive).length-2, vendors.filter(v=>v.subscriptionActive).length-1, vendors.filter(v=>v.subscriptionActive).length, vendors.filter(v=>v.subscriptionActive).length], borderColor: '#ffaa7a', backgroundColor: 'rgba(255,170,122,0.1)', tension: 0.4, fill: true }
                    ]
                },
                options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { grid: { color: '#333' }, ticks: { color: '#aaa' } }, x: { grid: { color: '#333' }, ticks: { color: '#aaa' } } } }
            });
        }

        function filterVendors() { currentVendorFilter = document.getElementById('vendorSearch').value; renderVendorTable(getVendors()); }
        function filterCustomers() { currentCustomerFilter = document.getElementById('customerSearch').value; renderCustomerList(getCustomers()); }

        function initAdmin() {
            const vendors = getVendors();
            vendors.forEach(v => { if (v.subscriptionActive === undefined) v.subscriptionActive = false; if (v.subscriptionPaid === undefined) v.subscriptionPaid = false; });
            saveVendors(vendors);
            checkLogin();
        }
        initAdmin();
    </script>
</body>
</html>
