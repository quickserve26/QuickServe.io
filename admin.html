<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickServe - Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #ff6b35; border-radius: 4px; }

        .navbar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #ff6b35;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logo:hover { transform: scale(1.05); }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #ffaa7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logout-btn {
            background: #ff6b35;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover { background: #e55a2a; transform: scale(1.05); }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px 5%; }

        /* Auth */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 107, 53, 0.3);
            transition: all 0.4s ease;
        }
        .auth-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(255, 107, 53, 0.2); border-color: #ff6b35; }
        .auth-card h2 { text-align: center; margin-bottom: 30px; color: #ff6b35; }
        .auth-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .auth-input:focus { outline: none; border-color: #ff6b35; box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.2); }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        .auth-btn:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(255, 107, 53, 0.3); }

        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #2a2a2a;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.1), transparent);
            transition: left 0.6s ease;
        }
        .card:hover { transform: translateY(-5px); border-color: #ff6b35; }
        .card:hover::before { left: 100%; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a1a, #252525);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s ease;
            border: 1px solid #333;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-radius: 40px 20px 40px 20px;
            border-color: #ff6b35;
        }
        .stat-number { font-size: 42px; font-weight: 800; color: #ff6b35; }

        .vendor-table {
            width: 100%;
            border-collapse: collapse;
        }
        .vendor-table th, .vendor-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .vendor-table tr:hover { background: #252525; }

        .customer-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .customer-item {
            padding: 12px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .customer-item:hover { background: #252525; }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        .btn-primary:hover { transform: scale(1.05); }
        .btn-outline {
            background: transparent;
            border: 2px solid #ff6b35;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ff6b35;
        }
        .btn-outline:hover { background: #ff6b35; color: white; }
        .btn-danger {
            background: #ff4444;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        .btn-danger:hover { background: #cc0000; transform: scale(1.05); }

        .search-input {
            padding: 10px 15px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 40px;
            color: white;
            width: 250px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; }
            .vendor-table { font-size: 12px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">QS</div>
            <div class="logo-text">QuickServe</div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="container">
        <!-- Admin Login -->
        <div id="authSection" class="auth-container">
            <div class="auth-card">
                <h2>Admin Login</h2>
                <input type="text" id="adminEmail" placeholder="Admin Email" class="auth-input" value="quickserve@gmail.com">
                <input type="password" id="adminPassword" placeholder="Password" class="auth-input" value="servequick@26">
                <button class="auth-btn" onclick="handleAdminLogin()">Login</button>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="dashboard" class="dashboard">
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-number" id="totalVendors">0</span><br>Total Vendors</div>
                <div class="stat-card"><span class="stat-number" id="activeVendors">0</span><br>Active Vendors</div>
                <div class="stat-card"><span class="stat-number" id="totalCustomers">0</span><br>Total Customers</div>
                <div class="stat-card"><span class="stat-number" id="totalOrders">0</span><br>Total Orders</div>
                <div class="stat-card"><span class="stat-number" id="monthlyRevenue">P0</span><br>Monthly Revenue</div>
            </div>

            <div class="card">
                <h3><i class="fas fa-chart-bar"></i> Platform Analytics</h3>
                <canvas id="adminChart" style="max-height: 300px; width: 100%;"></canvas>
            </div>

            <div class="card">
                <h3><i class="fas fa-store"></i> All Vendors</h3>
                <input type="text" id="vendorSearch" class="search-input" placeholder="🔍 Search vendors..." onkeyup="filterVendors()">
                <table class="vendor-table">
                    <thead>
                        <tr><th>Vendor Name</th><th>Location</th><th>Phone</th><th>Subscription</th><th>Status</th><th>Actions</th>
                                                </thead>
                    <tbody id="adminVendorList"></tbody>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-users"></i> All Customers</h3>
                <input type="text" id="customerSearch" class="search-input" placeholder="🔍 Search customers..." onkeyup="filterCustomers()">
                <div id="adminCustomerList" class="customer-list"></div>
            </div>

            <div class="card">
                <h3><i class="fas fa-dollar-sign"></i> Subscription Payments</h3>
                <div id="paymentHistory"></div>
                <button class="btn-primary" onclick="recordPayment()" style="margin-top: 15px;">Record Payment</button>
            </div>
        </div>
    </div>

    <script>
        // Admin Credentials
        const ADMIN_EMAIL = "quickserve@gmail.com";
        const ADMIN_PASSWORD = "servequick@26";
        
        // Storage Keys
        const VENDOR_STORAGE_KEY = 'quickServe_vendors';
        const CUSTOMER_STORAGE_KEY = 'quickServe_customers';
        const ORDERS_KEY = 'quickServe_allOrders';

        let adminChart = null;
        let currentVendorFilter = '';
        let currentCustomerFilter = '';

        function getVendors() {
            return JSON.parse(localStorage.getItem(VENDOR_STORAGE_KEY)) || [];
        }

        function getCustomers() {
            return JSON.parse(localStorage.getItem(CUSTOMER_STORAGE_KEY)) || [];
        }

        function getAllOrders() {
            return JSON.parse(localStorage.getItem(ORDERS_KEY)) || [];
        }

        function saveVendors(vendors) {
            localStorage.setItem(VENDOR_STORAGE_KEY, JSON.stringify(vendors));
        }

        function saveCustomers(customers) {
            localStorage.setItem(CUSTOMER_STORAGE_KEY, JSON.stringify(customers));
        }

        function handleAdminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                localStorage.setItem('quickServe_adminLoggedIn', 'true');
                showDashboard();
            } else {
                alert('Invalid admin credentials');
            }
        }

        function checkLogin() {
            if (localStorage.getItem('quickServe_adminLoggedIn') === 'true') {
                showDashboard();
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('dashboard').classList.remove('active');
            }
        }

        function showDashboard() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            renderAdminDashboard();
        }

        function logout() {
            localStorage.removeItem('quickServe_adminLoggedIn');
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
        }

        function renderAdminDashboard() {
            const vendors = getVendors();
            const customers = getCustomers();
            const allOrders = getAllOrders();
            const activeVendors = vendors.filter(v => v.subscriptionPaid === true);

            document.getElementById('totalVendors').innerHTML = vendors.length;
            document.getElementById('activeVendors').innerHTML = activeVendors.length;
            document.getElementById('totalCustomers').innerHTML = customers.length;
            document.getElementById('totalOrders').innerHTML = allOrders.length;
            const monthlyRevenue = vendors.filter(v => v.subscriptionPaid).length * 250;
            document.getElementById('monthlyRevenue').innerHTML = `P${monthlyRevenue}`;

            renderVendorTable(vendors);
            renderCustomerList(customers);
            renderPaymentHistory(vendors);
            updateChart(vendors, allOrders);
        }

        function renderVendorTable(vendors) {
            let filteredVendors = vendors;
            if (currentVendorFilter) {
                filteredVendors = vendors.filter(v => 
                    v.name.toLowerCase().includes(currentVendorFilter.toLowerCase()) ||
                    (v.location && v.location.toLowerCase().includes(currentVendorFilter.toLowerCase())) ||
                    (v.email && v.email.toLowerCase().includes(currentVendorFilter.toLowerCase()))
                );
            }

            const tbody = document.getElementById('adminVendorList');
            tbody.innerHTML = filteredVendors.map(v => `
                <tr>
                    <td><strong>${v.name}</strong><br><small style="color:#888;">${v.email}</small></td>
                    <td>${v.location || 'Not set'}</td>
                    <td>${v.phone || 'Not set'}</td>
                    <td>P250/month</td>
                    <td style="color: ${v.subscriptionPaid ? '#4caf50' : '#ff6b35'}; font-weight: bold;">
                        ${v.subscriptionPaid ? '✓ Active' : '✗ Inactive'}
                    </td>
                    <td>
                        <button class="btn-outline" onclick="toggleVendorSubscription(${v.id})" style="margin-right: 5px;">
                            ${v.subscriptionPaid ? 'Deactivate' : 'Activate'}
                        </button>
                        <button class="btn-danger" onclick="deleteVendor(${v.id})">
                            <i class="fas fa-trash"></i> Remove
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function renderCustomerList(customers) {
            let filteredCustomers = customers;
            if (currentCustomerFilter) {
                filteredCustomers = customers.filter(c => 
                    c.name.toLowerCase().includes(currentCustomerFilter.toLowerCase()) ||
                    c.email.toLowerCase().includes(currentCustomerFilter.toLowerCase()) ||
                    (c.location && c.location.toLowerCase().includes(currentCustomerFilter.toLowerCase()))
                );
            }

            const container = document.getElementById('adminCustomerList');
            container.innerHTML = filteredCustomers.map(c => `
                <div class="customer-item">
                    <div>
                        <strong><i class="fas fa-user"></i> ${c.name}</strong><br>
                        <small style="color:#888;">${c.email}</small><br>
                        <small><i class="fas fa-map-marker-alt"></i> ${c.location || 'Location not set'}</small><br>
                        <small><i class="fas fa-shopping-bag"></i> ${c.orders?.length || 0} orders placed</small>
                    </div>
                    <button class="btn-danger" onclick="deleteCustomer(${c.id})">
                        <i class="fas fa-trash"></i> Remove Customer
                    </button>
                </div>
            `).join('');
        }

        function renderPaymentHistory(vendors) {
            const paidVendors = vendors.filter(v => v.subscriptionPaid);
            const container = document.getElementById('paymentHistory');
            if (paidVendors.length === 0) {
                container.innerHTML = '<p style="color:#888;">No payments recorded this month</p>';
                return;
            }
            container.innerHTML = paidVendors.map(v => `
                <div style="padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong>${v.name}</strong><br>
                        <small>${v.email}</small>
                    </div>
                    <div style="text-align: right;">
                        <span style="color:#4caf50;">✓ P250 paid</span><br>
                        <small>Subscription active</small>
                    </div>
                </div>
            `).join('');
        }

        function toggleVendorSubscription(vendorId) {
            const vendors = getVendors();
            const vendor = vendors.find(v => v.id === vendorId);
            if (vendor) {
                vendor.subscriptionPaid = !vendor.subscriptionPaid;
                saveVendors(vendors);
                renderAdminDashboard();
                alert(`${vendor.name} subscription ${vendor.subscriptionPaid ? 'activated' : 'deactivated'}`);
            }
        }

        function deleteVendor(vendorId) {
            const vendors = getVendors();
            const vendor = vendors.find(v => v.id === vendorId);
            if (confirm(`Are you sure you want to remove "${vendor?.name}"? This will delete all their data and cannot be undone.`)) {
                const filteredVendors = vendors.filter(v => v.id !== vendorId);
                saveVendors(filteredVendors);
                renderAdminDashboard();
                alert('Vendor removed successfully');
            }
        }

        function deleteCustomer(customerId) {
            const customers = getCustomers();
            const customer = customers.find(c => c.id === customerId);
            if (confirm(`Are you sure you want to remove "${customer?.name}"? This will delete all their order history.`)) {
                const filteredCustomers = customers.filter(c => c.id !== customerId);
                saveCustomers(filteredCustomers);
                renderAdminDashboard();
                alert('Customer removed successfully');
            }
        }

        function recordPayment() {
            const vendors = getVendors();
            const unpaidVendors = vendors.filter(v => !v.subscriptionPaid);
            if (unpaidVendors.length === 0) {
                alert('All vendors have active subscriptions!');
                return;
            }
            const vendorNames = unpaidVendors.map(v => v.name).join(', ');
            const vendorName = prompt(`Enter vendor name to record payment.\nUnpaid vendors: ${vendorNames}`);
            const vendor = vendors.find(v => v.name.toLowerCase() === vendorName?.toLowerCase());
            if (vendor) {
                vendor.subscriptionPaid = true;
                saveVendors(vendors);
                renderAdminDashboard();
                alert(`Payment recorded for ${vendor.name}. Subscription now active.`);
            } else {
                alert('Vendor not found. Please check the name.');
            }
        }

        function updateChart(vendors, orders) {
            const ctx = document.getElementById('adminChart')?.getContext('2d');
            if (!ctx) return;
            
            const weeks = ['Week 1', 'Week 2', 'Week 3', 'Week 4'];
            const weeklyOrders = [45, 62, 78, orders.length];
            const vendorGrowth = [vendors.length - 2, vendors.length - 1, vendors.length, vendors.length];
            
            if (adminChart) adminChart.destroy();
            adminChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: weeks,
                    datasets: [
                        {
                            label: 'Orders',
                            data: weeklyOrders,
                            borderColor: '#ff6b35',
                            backgroundColor: 'rgba(255, 107, 53, 0.1)',
                            tension: 0.4,
                            fill: true,
                            borderWidth: 2
                        },
                        {
                            label: 'Vendors',
                            data: vendorGrowth,
                            borderColor: '#ffaa7a',
                            backgroundColor: 'rgba(255, 170, 122, 0.1)',
                            tension: 0.4,
                            fill: true,
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            labels: { color: '#ffffff' }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: '#333' },
                            ticks: { color: '#aaa' }
                        },
                        x: {
                            grid: { color: '#333' },
                            ticks: { color: '#aaa' }
                        }
                    }
                }
            });
        }

        function filterVendors() {
            currentVendorFilter = document.getElementById('vendorSearch').value;
            renderVendorTable(getVendors());
        }

        function filterCustomers() {
            currentCustomerFilter = document.getElementById('customerSearch').value;
            renderCustomerList(getCustomers());
        }

        // Initialize default subscription status for all vendors
        function initAdmin() {
            const vendors = getVendors();
            let changed = false;
            vendors.forEach(v => {
                if (v.subscriptionPaid === undefined) {
                    v.subscriptionPaid = true;
                    changed = true;
                }
                if (!v.menu) v.menu = [];
                if (!v.orders) v.orders = [];
                if (!v.orderHistory) v.orderHistory = [];
            });
            if (changed) saveVendors(vendors);
            checkLogin();
        }

        initAdmin();
    </script>
</body>
</html>
