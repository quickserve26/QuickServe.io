<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - QwikServe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .confirmation-card { background: white; max-width: 500px; padding: 3rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .success-icon { width: 80px; height: 80px; background: #10b981; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 2rem; }
        h1 { margin-bottom: 1rem; color: #10b981; }
        .order-number { background: #f3f4f6; padding: 1rem; border-radius: 10px; margin: 1.5rem 0; }
        .order-number .label { color: #666; }
        .order-number .number { font-size: 1.5rem; font-weight: bold; color: #6366f1; }
        .details { text-align: left; background: #f9fafb; padding: 1.5rem; border-radius: 10px; margin: 1.5rem 0; }
        .detail-row { display: flex; justify-content: space-between; margin: 0.5rem 0; }
        .actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-primary { flex: 1; padding: 1rem; background: #6366f1; color: white; text-decoration: none; border-radius: 5px; }
        .btn-secondary { flex: 1; padding: 1rem; background: white; color: #6366f1; text-decoration: none; border-radius: 5px; border: 1px solid #6366f1; }
    </style>
</head>
<body>
    <div class="confirmation-card">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        
        <h1>Order Confirmed!</h1>
        <p>Thank you for your order. We've sent a confirmation to your phone.</p>
        
        <div class="order-number">
            <div class="label">Order Number</div>
            <div class="number">#QW-2024-1234</div>
        </div>
        
        <div class="details">
            <h3>Order Details</h3>
            <div class="detail-row">
                <span>Vendor:</span>
                <span><strong>Mma Keitumetse's</strong></span>
            </div>
            <div class="detail-row">
                <span>Items:</span>
                <span>2x Seswaa with Pap, 1x Magwinya</span>
            </div>
            <div class="detail-row">
                <span>Total:</span>
                <span><strong>P105</strong></span>
            </div>
            <div class="detail-row">
                <span>Pickup Time:</span>
                <span>12:45 PM (in 15 min)</span>
            </div>
            <div class="detail-row">
                <span>Payment:</span>
                <span>Orange Money - Paid</span>
            </div>
        </div>
        
        <div class="actions">
            <a href="order-tracking.html?id=1234" class="btn-primary">Track Order</a>
            <a href="browse-vendors.html" class="btn-secondary">Order More</a>
        </div>
    </div>
</body>
</html>
