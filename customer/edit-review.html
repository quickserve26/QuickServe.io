<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Review - QwikServe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; }
        .edit-container { max-width: 600px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .rating-stars { font-size: 2rem; color: #fbbf24; margin: 1rem 0; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; height: 120px; }
        .actions { display: flex; gap: 1rem; }
        .save-btn { flex: 1; padding: 1rem; background: #6366f1; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .cancel-btn { flex: 1; padding: 1rem; background: white; color: #6366f1; border: 1px solid #6366f1; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="edit-container">
        <h1>Edit Your Review</h1>
        
        <div class="rating-stars">
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="far fa-star"></i>
        </div>
        
        <div class="form-group">
            <label>Review Title</label>
            <input type="text" value="Great food but slow service">
        </div>
        
        <div class="form-group">
            <label>Your Review</label>
            <textarea>The food was delicious but the wait was a bit long during lunch rush.</textarea>
        </div>
        
        <div class="actions">
            <button class="save-btn">Save Changes</button>
            <button class="cancel-btn" onclick="window.location.href='my-orders.html'">Cancel</button>
        </div>
    </div>
</body>
</html>
