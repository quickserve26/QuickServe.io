<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - QwikServe</title>
    <link rel="stylesheet" href="../styles/customer.css">
</head>
<body class="customer-view">
    <nav class="navbar customer-nav"><!-- Same --></nav>

    <div class="checkout-page">
        <h1>Checkout</h1>

        <div class="checkout-layout">
            <div class="checkout-form">
                <!-- Contact Information -->
                <div class="checkout-section">
                    <h2>Contact Information</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" value="John Doe" readonly>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" value="71 234 567" readonly>
                        </div>
                    </div>
                </div>

                <!-- Payment Method -->
                <div class="checkout-section">
                    <h2>Payment Method</h2>
                    <div class="payment-options">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="orange" checked>
                            <span class="payment-icon"><i class="fas fa-mobile-alt"></i></span>
                            <span>Orange Money</span>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="myzaka">
                            <span class="payment-icon"><i class="fas fa-wifi"></i></span>
                            <span>MyZaka</span>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="card">
                            <span class="payment-icon"><i class="fas fa-credit-card"></i></span>
                            <span>Card Payment</span>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="cash">
                            <span class="payment-icon"><i class="fas fa-money-bill"></i></span>
                            <span>Cash on Collection</span>
                        </label>
                    </div>
                </div>

                <!-- Orange Money Form -->
                <div class="payment-form" id="orangeForm">
                    <div class="form-group">
                        <label>Orange Money Phone Number</label>
                        <input type="tel" placeholder="71 234 567">
                    </div>
                    <div class="form-group">
                        <label>PIN</label>
                        <input type="password" placeholder="Enter your PIN" maxlength="4">
                    </div>
                </div>
