<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart - QwikServe</title>
    <link rel="stylesheet" href="../styles/customer.css">
</head>
<body class="customer-view">
    <nav class="navbar customer-nav"><!-- Same --></nav>

    <div class="cart-page">
        <h1>Your Cart</h1>
        
        <div class="cart-layout">
            <!-- Cart Items -->
            <div class="cart-items">
                <div class="cart-item">
                    <img src="https://images.unsplash.com/photo-1606491956689-2ea866880c84?w=100" alt="Seswaa">
                    <div class="item-details">
                        <h3>Seswaa with Pap</h3>
                        <p>Mma Keitumetse's Kitchen</p>
                        <div class="item-price">P45 each</div>
                    </div>
                    <div class="item-quantity">
                        <button class="qty-btn">-</button>
                        <input type="number" value="2" min="1">
                        <button class="qty-btn">+</button>
                    </div>
                    <div class="item-total">P90</div>
                    <button class="remove-item"><i class="fas fa-trash"></i></button>
                </div>
                <!-- More items... -->
            </div>

            <!-- Order Summary -->
            <div class="order-summary">
                <h2>Order Summary</h2>
                
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>P135</span>
                </div>
                <div class="summary-row">
                    <span>Service Fee</span>
                    <span>P5</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>P140</span>
                </div>

                <div class="delivery-options">
                    <h3>Delivery Option</h3>
                    <label class="radio-label">
                        <input type="radio" name="delivery" value="pickup" checked>
                        <span>Pick up myself (Free)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="delivery" value="delivery">
                        <span>Delivery (+P15)</span>
                    </label>
                </div>

                <div class="special-instructions">
                    <textarea placeholder="Special instructions (e.g., extra spicy, no onions)"></textarea>
                </div>

                <a href="checkout.html" class="primary-btn full-width">Proceed to Checkout</a>
                <a href="browse-vendors.html" class="secondary-btn full-width">Continue Shopping</a>
            </div>
        </div>
    </div>
</body>
</html>
