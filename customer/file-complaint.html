<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File a Complaint - QwikServe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; }
        .complaint-container { max-width: 600px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #ef4444; margin-bottom: 0.5rem; }
        .info-box { background: #eef2ff; padding: 1rem; border-radius: 5px; margin: 1rem 0; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group select, .form-group input, .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; }
        .form-group textarea { height: 150px; }
        .priority-high { color: #ef4444; font-weight: bold; }
        .submit-btn { width: 100%; padding: 1rem; background: #ef4444; color: white; border: none; border-radius: 5px; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="complaint-container">
        <h1><i class="fas fa-exclamation-triangle"></i> File a Complaint</h1>
        <p>We'll help resolve your issue with the vendor</p>

        <div class="info-box">
            <strong>Order Details:</strong> #QW-2024-1234 - Mma Keitumetse's Kitchen
        </div>

        <div class="form-group">
            <label>Issue Type</label>
            <select>
                <option>Late Delivery / Order Delayed</option>
                <option>Wrong Item Received</option>
                <option>Food Quality Issue</option>
                <option>Unhygienic Conditions</option>
                <option>Staff Behavior</option>
                <option>Pricing Issue</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Describe the Issue</label>
            <textarea placeholder="Please provide detailed information about what happened..."></textarea>
        </div>

        <div class="form-group">
            <label>Expected Resolution</label>
            <select>
                <option>Full Refund</option>
                <option>Partial Refund</option>
                <option>Replacement Order</option>
                <option>Apology / Explanation</option>
                <option>Discount on Next Order</option>
            </select>
        </div>

        <div class="form-group">
            <label>Priority</label>
            <select>
                <option>Normal - Not urgent</option>
                <option class="priority-high">High - Urgent issue</option>
            </select>
        </div>

        <div class="form-group">
            <label>Order Number (auto-filled)</label>
            <input type="text" value="#QW-2024-1234" readonly>
        </div>

        <button class="submit-btn" onclick="submitComplaint()">
            Submit Complaint
        </button>
    </div>

    <script>
        function submitComplaint() {
            alert('Complaint submitted successfully. We\'ll contact you within 24 hours.');
            window.location.href = 'complaint-history.html';
        }
    </script>
</body>
</html>
